services:
  mock-oidc:
    build:
      context: ./mock_oidc
    ports:
      - "3007:10090"
    environment:
      - MOCK_OIDC_EXTERNAL_BASE_URL=http://localhost:3007
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_DEFAULT_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_DEFAULT_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
