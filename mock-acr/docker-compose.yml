services:
  mock-acr:
    build: .
    ports:
      - "${MOCK_ACR_PORT:-5100}:5100"
    environment:
      MOCK_ACR_REGISTRY_HOST: "localhost:${MOCK_ACR_PORT:-5100}"
      MOCK_ACR_DATA_DIR: "/data"
    volumes:
      - acr-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5100/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  acr-data:
